<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>번역 허브</title>

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F7FB;
            font-family: system-ui, -apple-system, sans-serif;
            color: #111827;
        }

        #app {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0px 30px;
            box-sizing: border-box;
        }

        /* TOP: translation ONLY */
        #translated {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
    
            width: 90%;
            max-height: 5.2em;

            font-size: 32px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;

            overflow: hidden;
            white-space: pre-wrap;

            color: #111827;

            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* CENTER BAR */
        #horizon {
            margin-bottom: auto;
            position: absolute;
            top: 70%;
            left: 0;
            width: 100%;
            height: 60px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        #line {
            position: absolute;
            width: 100%;
            height: 1.5px;
            background: rgba(56, 189, 248, 0.45);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
            top: 50%;
            transform: translateY(-50%);
            border-radius: 999px;
        }

        /* mode button */
        #swap {
            position: relative;
            z-index: 2;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            color: #0F172A;
            font-size: 14px;
        }

        /* BOTTOM: transcript */
        #transcript {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;

            font-size: 16px;
            opacity: 0.55;
            min-height: 60px;
            }

        .recording #swap {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(56, 189, 248, 0);
            }

            50% {
                transform: scale(1.04);
                box-shadow: 0 0 10px rgba(51, 71, 79, 0.1);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(56, 189, 248, 0);
            }
    }
    </style>
</head>

<body>

    <div id="app">

        <!-- TOP -->
        <div id="translated">번역 허브</div>

        <!-- CENTER -->
        <div id="horizon">
            <div id="line"></div>
            <div style="display:flex; gap:10px; align-items:center; z-index:2;">
                <button id="swap">한국어 → Монгол</button>
                <button id="flipBtn">⇅</button>      </div>
        </div>

        <!-- BOTTOM -->
        <div id="transcript">...</div>

    </div>

    <script>
        let isRecording = false;
        let mode = "한국어 → Монгол";
        let isFlipped = false;

        const MAX_CHARS = 30;

        const flipBtn = document.getElementById("flipBtn");
        const app = document.getElementById("app");
        const translated = document.getElementById("translated");
        const transcript = document.getElementById("transcript");
        const swap = document.getElementById("swap");

        let demo = [
            "어디에 기차역이 있나요",
            "길을 찾고 있어요",
            "여기서 얼마나 멀어요",
            "감사합니다",
            "어마어마하게 긴 문장으로 테스트해봅시다. 과연 어떻게 보이는지 궁금하네요. 이 문장은 번역된 텍스트가 길어질 때 어떻게 처리되는지 보여주기 위해 작성되었습니다. 과연 줄바꿈이 잘 되는지, 그리고 전체적인 레이아웃이 어떻게 유지되는지 확인해봅시다.",
            "Сайн уу?",
            "Энэ бол туршилтын өгүүлбэр юм.",
            "Орчуулга хэрхэн харагдаж байгааг шалгахын тулд урт өгүүлбэр бичсэн. Энэ нь текст хэрхэн зохицож байгааг, мөн дизайн элементүүд хэрхэн хадгалагдаж байгааг шалгах болно."
        ];

        let i = 0;

        /* tap anywhere */
        app.addEventListener("click", (e) => {
            if (e.target.id === "swap") return;

            isRecording = !isRecording;

            if (isRecording) {
                app.classList.add("recording");
                transcript.textContent = "듣는 중...";
                loopSpeech();
            } else {
                app.classList.remove("recording");
                transcript.textContent = "정지";
            }
        });

        /* mode switch ONLY here */
        swap.addEventListener("click", (e) => {
            e.stopPropagation();

            if (mode === "한국어 → Монгол") mode = "Монгол → 한국어";
            else if (mode === "Монгол → 한국어") mode = "한국어 → Монгол";
            else mode = "한국어 → Монгол";

            swap.textContent = mode;
        });

        let rotation = 0;
        flipBtn.addEventListener("click", (e) => {
            e.stopPropagation();

            rotation += 180;
            translated.style.transform = `translateX(-50%) rotate(${rotation}deg)`;

            isFlipped = !isFlipped;

            if (isFlipped) {
                flipBtn.textContent = "⇅✓";
            } else {
                flipBtn.textContent = "⇅";
            }
        });

        /* speech loop */
        function loopSpeech() {
            if (!isRecording) return;

            const line = demo[i % demo.length];
            i++;

            function cropText(text) {
                if (text.length <= MAX_CHARS) return text;
                return "..." + text.slice(text.length - MAX_CHARS, text.length);
            }

            transcript.textContent = cropText(line);
            translated.textContent = cropText(line);

            setTimeout(loopSpeech, 2000);
        }
    </script>

</body>

</html>
