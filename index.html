<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>번역 허브</title>

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F7FB;
            font-family: system-ui, -apple-system, sans-serif;
            color: #111827;
        }

        #app {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0px 30px;
            box-sizing: border-box;
        }

        #translated {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-height: 5.2em;
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
            overflow: hidden;
            white-space: pre-wrap;
            color: #111827;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #horizon {
            margin-bottom: auto;
            position: absolute;
            top: 70%;
            left: 0;
            width: 100%;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #line {
            position: absolute;
            width: 100%;
            height: 1.5px;
            background: rgba(56, 189, 248, 0.45);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
            top: 50%;
            transform: translateY(-50%);
            border-radius: 999px;
        }

        .controlBtn {
            position: relative;
            z-index: 2;
            padding: 16px 22px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            color: #0F172A;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
        }

        .mic {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .micIcon {
            width: 42px;
            height: 42px;
            scale: 2;
        }

        .mic.active {
            background: #38BDF8;
            color: white;
            box-shadow: 0 8px 24px rgba(56, 189, 248, 0.35);
        }

        #transcript {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 16px;
            opacity: 0.55;
            min-height: 60px;
        }

        #swapText {
            display: inline-block;
            transition: transform 0.35s ease, opacity 0.2s ease;
            transform-origin: center;
        }


        #inputPanel {
    position: absolute;
    bottom: -220px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;

    display: flex;
    flex-direction: column;
    gap: 10px;

    transition: bottom .35s ease;
}

#inputPanel.show {
    bottom: 80px;
}

#inputBox {
    resize: none;

    border: none;
    border-radius: 18px;

    padding: 16px;

    font-size: 18px;

    outline: none;

    background: rgba(255,255,255,.92);

    box-shadow: 0 6px 20px rgba(0,0,0,.08);
}

#translateBtn {
    border: none;
    border-radius: 999px;

    padding: 14px;

    cursor: pointer;

    background: #38BDF8;
    color: white;

    font-size: 18px;
}

@keyframes loadingPulse {

0% {
    background: #FACC15;
    box-shadow: 0 0 6px #FACC15;
}

50% {
    background: #FDE68A;
    box-shadow: 0 0 18px #FACC15;
}

100% {
    background: #FACC15;
    box-shadow: 0 0 6px #FACC15;
}
}

#line.loading {
animation: loadingPulse 1s infinite;
}
    </style>
</head>

<body>

    <div id="app">

        <div id="translated">번역 허브</div>

        <div id="horizon">
            <div id="line"></div>

            <div style="display:flex; gap:10px; align-items:center; z-index:2;">
                <button id="keyboardBtn" class="controlBtn mic">
                    <svg class="micIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                        <path
                            d="M80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240Zm80 0h640v-480H160v480Zm80-80h80v-80h-80v80Zm120 0h80v-80h-80v80Zm120 0h80v-80h-80v80Zm120 0h80v-80h-80v80ZM240-440h80v-80h-80v80Zm120 0h80v-80h-80v80Zm120 0h80v-80h-80v80Zm120 0h80v-80h-80v80ZM240-560h480v-80H240v80Z" />
                    </svg>       </button>

                <button id="swap" class="controlBtn">
                    <span id="swapText">한국어 → Монгол</span>
                </button>
            </div>
        </div>

        <div id="inputPanel">
            <textarea id="inputBox" placeholder="Type here..." rows="3"></textarea>
        
            <button id="translateBtn">Translate</button>  </div>

        <div id="transcript">...</div>

    </div>

        const app = document.getElementById("app");
        const keyboardBtn = document.getElementById("keyboardBtn");
        const transcript = document.getElementById("transcript");
        const translated = document.getElementById("translated");
        const swap = document.getElementById("swap");
        const swapText = document.getElementById("swapText");
        const line = document.getElementById("line");
        
        const inputPanel = document.getElementById("inputPanel");
        const inputBox = document.getElementById("inputBox");
        const translateBtn = document.getElementById("translateBtn");


        //let fullTranscriptWords = [];   //only show MAX_WORDS number of words in the transcript to make it look cleaner
        //const MAX_WORDS = 10;

        let mode = "한국어 → Монгол";

        async function loadTranslator() {

                try {

                    transcript.textContent = "Loading translator...";
                    console.log("Loading model...");

                    translator = await pipeline(
                        "translation",
                        "Xenova/nllb-200-distilled-600M"
                    );

                    console.log("Loaded!", translator);

                    transcript.textContent = "Ready ✨";

                } catch (err) {

                    console.error(err);

                    transcript.textContent = "FAILED";

                }
            }

            async function init() {
                await loadTranslator();
            }

        init();

        /* =========================
           CLICK CONTROL
        ========================= */
        keyboardBtn.addEventListener("click", (e) => {

                e.stopPropagation();

                inputPanel.classList.add("show");

                inputBox.focus();
            });
 
            translateBtn.addEventListener("click", async () => {

                    if (!translator) return;

                    const text = inputBox.value.trim();
                    inputPanel.classList.remove("show");
                    inputBox.value = "";

                    if (!text) return;

                    line.classList.add("loading");

                translated.textContent = "";

                transcript.textContent = text;

                translateBtn.disabled = true;
                keyboardBtn.disabled = true;
                try {
                    line.classList.add("loading");

                    await new Promise(resolve => setTimeout(resolve, 30));

                    const result = await translator(text, {
                        src_lang: mode === "한국어 → Монгол"
                            ? "kor_Hang"
                            : "khk_Cyrl",

                        tgt_lang: mode === "한국어 → Монгол"
                            ? "khk_Cyrl"
                            : "kor_Hang"
                    });

                    translated.textContent = result[0].translation_text;
                    transcript.textContent = "";
                    line.style.background = "rgba(56,189,248,.45)";
                    line.style.boxShadow = "0 0 12px rgba(56,189,248,.25)";

                }
                catch (err) {

                    console.error(err);

                    transcript.textContent = "Translation failed.";

                    line.style.background = "#EF4444";
                    line.style.boxShadow = "0 0 12px #EF4444";

                }
                finally {

                    line.classList.remove("loading");
                    translateBtn.disabled = false;
                    keyboardBtn.disabled = false;

                }


                });

                inputBox.addEventListener("keydown", async (e) => {

                        if (e.key !== "Enter" || e.shiftKey) return;

                        e.preventDefault();

                        translateBtn.click();
                    });

                document.addEventListener("click", (e) => {

                        if (!inputPanel.contains(e.target) &&
                            !keyboardBtn.contains(e.target)) {

                            inputPanel.classList.remove("show");
                        }
                    });
        /* =========================
           MODE SWAP (UNCHANGED UI)
        ========================= */
        swap.addEventListener("click", (e) => {
            e.stopPropagation();

            swapText.style.transform = "scaleX(0)";
            swapText.style.opacity = "0";

            setTimeout(() => {
                mode = (mode === "한국어 → Монгол")
                    ? "Монгол → 한국어"
                    : "한국어 → Монгол";

                swapText.textContent = mode;

                swapText.style.transform = "scaleX(1)";
                swapText.style.opacity = "1";
            }, 180);
        });

</body>

</html>
