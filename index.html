<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>번역 허브</title>

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F7FB;
            font-family: system-ui, -apple-system, sans-serif;
            color: #111827;
        }

        #app {
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 0px 30px;
            box-sizing: border-box;
        }

        #translated {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-height: 5.2em;
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
            overflow: hidden;
            white-space: pre-wrap;
            color: #111827;
        }

        #horizon {
            position: absolute;
            top: 70%;
            left: 0;
            width: 100%;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #line {
            position: absolute;
            width: 100%;
            height: 1.5px;
            background: rgba(56, 189, 248, 0.45);
            top: 50%;
            transform: translateY(-50%);
            border-radius: 999px;
        }

        .controlBtn {
            padding: 16px 22px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            cursor: pointer;
            font-size: 18px;
        }

        .mic {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic.active {
            background: #38BDF8;
            color: white;
        }

        #transcript {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: 16px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div id="app">

        <div id="translated">번역 허브</div>

        <div id="horizon">
            <div id="line"></div>

            <button id="micBtn" class="controlBtn mic">
                🎤
            </button>
        </div>

        <div id="transcript">...</div>

    </div>

    <script>
        let isRecording = false;

        let mediaStream;
        let recorder;
        let chunks = [];

        const CHUNK_TIME = 4000;

        const app = document.getElementById("app");
        const micBtn = document.getElementById("micBtn");
        const transcript = document.getElementById("transcript");
        const translated = document.getElementById("translated");

        app.addEventListener("click", async (e) => {
            if (e.target.id !== "micBtn") return;

            isRecording = !isRecording;

            if (isRecording) {
                micBtn.classList.add("active");
                transcript.textContent = "듣는 중... 🎤";

                await startMicLoop();
            } else {
                micBtn.classList.remove("active");
                transcript.textContent = "정지 💤";
                stopMicLoop();
            }
        });

        async function startMicLoop() {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            runCycle();
        }

        function runCycle() {
            if (!isRecording) return;

            chunks = [];
            recorder = new MediaRecorder(mediaStream);

            recorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: "audio/webm" });
                playAndRepeat(blob);
            };

            recorder.start();

            setTimeout(() => {
                if (recorder.state === "recording") {
                    recorder.stop();
                }
            }, CHUNK_TIME);
        }

        function playAndRepeat(blob) {
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);

            audio.onended = () => {
                URL.revokeObjectURL(url);

                if (isRecording) {
                    runCycle();
                }
            };

            audio.play();
        }

        function stopMicLoop() {
            isRecording = false;

            mediaStream?.getTracks().forEach(t => t.stop());

            if (recorder && recorder.state === "recording") {
                recorder.stop();
            }
        }
    </script>

</body>

</html>
