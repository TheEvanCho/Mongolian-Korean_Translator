<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MK Translator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div id="app">

        <!-- MODE TOGGLE + CONTROLS -->
        <div id="controls">

            <div id="modeToggle">
                <button class="mode active" id="mnToKr">
                    MN → KR
                </button>

                <button class="mode" id="auto">
                    AUTO
                </button>
            </div>

            <button id="startBtn">
                Start Listening
            </button>

            <p id="status">Idle</p>

        </div>

        <!-- SUBTITLES -->
        <div id="subtitles">

            <p id="original">
                Монгол текст...
            </p>

            <p id="translated">
                한국어 번역...
            </p>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
